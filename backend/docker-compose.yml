services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 2181:2181
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - backend

  mysql:
    image: mysql:8.0
    container_name: mysql-8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: developer
    ports:
      - '3307:3306'
    expose:
      - '3306'
    volumes:
      - mysql-db:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdeveloper"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  userservice:
    image: user-service
    container_name: user-service
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: user_service
    ports:
      - '9810:9810'
    depends_on:
      kafka:
        condition: service_started
      mysql:
        condition: service_healthy
      authservice:
        condition: service_started
    networks:
      - backend

  expenseservice:
    image: expense-service
    container_name: expense-service
    ports:
      - '9820:9820'
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: expense_service
    depends_on:
      kafka:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - backend

  dsservice:
    image: ds_service
    container_name: ds_service
    ports:
      - '8010:8010'
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MISTRAL_API_KEY: NEW_KEY_HERE
    depends_on:
      kafka:
        condition: service_started
      mysql:
        condition: service_healthy
      expenseservice:
        condition: service_started
      userservice:
        condition: service_started
    networks:
      - backend

  authservice:
    image: auth-service
    container_name: auth-service
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: auth_service
    ports:
      - '9898:9898'
    depends_on:
      kafka:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - backend

  kong-service:
    build:
      context: ./kong

    container_name: kong-service

    environment:
      KONG_DATABASE: off
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: info
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
#      KONG_PLUGINS: bundled

    volumes:
      - ./kong/config:/usr/local/kong/declarative

    ports:
      - "8000:8000"
      - "8001:8001"

    depends_on:
      - authservice
      - userservice
      - expenseservice
      - dsservice

    networks:
      - backend

volumes:
  mysql-db:
    driver: local

networks:
  backend:
    driver: bridge