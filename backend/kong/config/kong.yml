_format_version: "3.0"

services:

  - name: auth-service
    url: http://authservice:9898

    routes:
      - name: auth-routes
        paths:
          - /auth

        strip_path: false

  - name: user-service
    url: http://userservice:9810

    routes:
      - name: user-routes

        paths:
          - /user

        strip_path: false

        plugins:

          - name: rate-limiting
            config:
              minute: 100

          - name: cors
            config:
              origins:
                - http://localhost:5173

              methods:
                - GET
                - POST
                - PUT
                - DELETE

              headers:
                - Authorization
                - Content-Type

              credentials: true

  - name: expense-service
    url: http://expenseservice:9820

    routes:
      - name: expense-routes

        paths:
          - /expense

        strip_path: false

        plugins:

          - name: rate-limiting
            config:
              minute: 100

  - name: ds_service
    url: http://dsservice:8010

    routes:
      - name: ds-routes

        paths:
          - /v1/ds

        strip_path: false

        plugins:

          - name: rate-limiting
            config:
              minute: 50