name: Expense Tracker CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────
      # 1. Checkout Code
      # ─────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ─────────────────────────────
      # 2. Login to Docker Hub
      # ─────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─────────────────────────────
      # 3. Set up Docker Buildx
      # ─────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────
      # 4. Build & Push Backend (Auth Service example)
      # ─────────────────────────────
      - name: Build & Push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/expense-tracker-app/authservice
          file: ./backend/expense-tracker-app/authservice/Dockerfile
          push: true
          tags: |
            hassansherwani10/expense-tracker-app:authservice-latest
            hassansherwani10/expense-tracker-app:authservice-${{ github.sha }}

      # ─────────────────────────────
      # 5. Build & Push User Service
      # ─────────────────────────────
      - name: Build & Push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/userservice/userservice
          file: ./backend/userservice/userservice/Dockerfile
          push: true
          tags: |
            hassansherwani10/expense-tracker-app:userservice-latest
            hassansherwani10/expense-tracker-app:userservice-${{ github.sha }}

      # ─────────────────────────────
      # 6. Build & Push Expense Service
      # ─────────────────────────────
      - name: Build & Push Expense Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/expenseservice/expenseservice
          file: ./backend/expenseservice/expenseservice/Dockerfile
          push: true
          tags: |
            hassansherwani10/expense-tracker-app:expenseservice-latest
            hassansherwani10/expense-tracker-app:expenseservice-${{ github.sha }}

      # ─────────────────────────────
      # 7. Build & Push DS Service
      # ─────────────────────────────
      - name: Build & Push DS Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/dsService
          file: ./backend/dsService/Dockerfile
          push: true
          tags: |
            hassansherwani10/expense-tracker-app:dsservice-latest
            hassansherwani10/expense-tracker-app:dsservice-${{ github.sha }}