name: Expense Tracker CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:

  # ─────────────────────────────────────────
  # 1. AUTH SERVICE — Build + Integration Test
  # ─────────────────────────────────────────
  auth-service:
    name: Auth Service — Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: developer
          MYSQL_DATABASE: auth_service
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pdeveloper"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENERS: PLAINTEXT://:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092
        options: >-
          --health-cmd="kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=10

    defaults:
      run:
        working-directory: backend/expense-tracker-app/authservice

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable (global fix)
        run: find backend -name gradlew -exec chmod +x {} \;

      - name: Build Auth Service (no tests yet)
        run: ./gradlew build -x test

      - name: Verify JAR was created
        run: ls -lh build/libs/auth-service.jar

      - name: Run Auth Service Tests
        env:
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_DB: auth_service
          MYSQL_USER: root
          MYSQL_PASSWORD: developer
          KAFKA_HOST: localhost
          KAFKA_PORT: 9092
          JWT_SECRET: 9fK7xL2vQwP8zYbH3RjT5mN6aC1dE4uV7sX9kL0qB2pW8ZyF6hD3tR5uJ1M4nC
          JWT_EXPIRATION: 900000
        run: ./gradlew test

      - name: Publish Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-service-test-report
          path: backend/expense-tracker-app/authservice/build/reports/tests/test/

  # ─────────────────────────────────────────
  # 2. USER SERVICE — Build + Integration Test
  # ─────────────────────────────────────────
