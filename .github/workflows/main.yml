  # ─────────────────────────────────────────
  # 4. DS SERVICE — Install, Test & Package
  # ─────────────────────────────────────────
  ds-service:
    name: DS Service — Install & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/dsService

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ── Unit test: schema validation (no LLM/Kafka needed) ──────────────────
      - name: Test Pydantic Expense Schema
        working-directory: backend/dsService/src
        run: |
          python -c "
          from app.schema.expense import Expense

          # Test 1: All fields populated
          e = Expense(amount='5000', merchant='IMTIAZ SUPER MARKET', currency='PKR')
          assert e.amount == '5000'
          assert e.merchant == 'IMTIAZ SUPER MARKET'
          assert e.currency == 'PKR'
          print('PASS: Expense schema with all fields')

          # Test 2: Optional fields default to None
          e2 = Expense()
          assert e2.amount is None
          assert e2.merchant is None
          assert e2.currency is None
          print('PASS: Expense schema with no fields (all optional)')

          # Test 3: Partial fields
          e3 = Expense(amount='1200')
          assert e3.amount == '1200'
          assert e3.merchant is None
          print('PASS: Expense schema with partial fields')

          print('All Pydantic schema tests passed.')
          "

      # ── Unit test: bank SMS keyword detection ───────────────────────────────
      - name: Test Bank SMS Detection (MessageUtil)
        working-directory: backend/dsService/src
        run: |
          python -c "
          from app.utils.message_util import MessageUtil
          util = MessageUtil()

          # These should be detected as bank SMS
          bank_messages = [
              'Your account has been debited Rs. 5000 at IMTIAZ SUPER MARKET',
              'Transaction alert: PKR 2500 debited from your account',
              'Dear customer, your card has been used for a purchase of 3000',
          ]

          # These should NOT be detected as bank SMS
          non_bank_messages = [
              'Hi! How are you doing today?',
              'Your OTP for login is 123456',
              'Reminder: Meeting at 3pm tomorrow',
          ]

          for msg in bank_messages:
              result = util.is_bank_sms(msg)
              print(f'  is_bank_sms(\"{msg[:40]}...\") = {result}')

          for msg in non_bank_messages:
              result = util.is_bank_sms(msg)
              print(f'  is_bank_sms(\"{msg[:40]}\") = {result}')

          print('MessageUtil test complete.')
          "

      - name: Test DS Service Module Imports
        working-directory: backend/dsService/src
        run: |
          python -c "
          import importlib.util, sys, os

          os.environ['MISTRAL_API_KEY'] = 'dummy_key_for_ci'

          def load_module(name, path):
              spec = importlib.util.spec_from_file_location(name, path)
              mod = importlib.util.module_from_spec(spec)
              sys.modules[name] = mod
              spec.loader.exec_module(mod)
              return mod

          # Load each module directly by file path — bypasses app/__init__.py entirely
          load_module('expense', 'app/schema/expense.py')
          print('PASS: app/schema/expense.py')

          load_module('message_util', 'app/utils/message_util.py')
          print('PASS: app/utils/message_util.py')

          load_module('auth_service', 'app/services/auth_service.py')
          print('PASS: app/services/auth_service.py')

          load_module('llm_service', 'app/services/llm_service.py')
          print('PASS: app/services/llm_service.py')

          load_module('message_service', 'app/services/message_service.py')
          print('PASS: app/services/message_service.py')

          print('All DS Service modules imported successfully.')
          "

      - name: Verify Package Build
        run: |
          pip install setuptools
          python setup.py sdist
          ls -lh dist/

  # ─────────────────────────────────────────
  # 5. FRONTEND — Install, Lint & Build
  # ─────────────────────────────────────────
  frontend:
    name: Frontend — Install, Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend/expense-tracker-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/expense-tracker-app/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build Vite Production Bundle
        run: npm run build

      - name: Verify dist folder was created
        run: ls -lh dist/

      - name: Upload Frontend Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/expense-tracker-app/dist/