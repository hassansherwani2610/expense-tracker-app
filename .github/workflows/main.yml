      - name: Make Gradle executable (global fix)
        run: find backend -name gradlew -exec chmod +x {} \;

      - name: Build User Service (no tests yet)
        run: ./gradlew build -x test

      - name: Verify JAR was created
        run: ls -lh build/libs/user-service.jar

      - name: Run User Service Tests
        env:
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_DB: user_service
          MYSQL_USER: root
          MYSQL_PASSWORD: developer
          KAFKA_HOST: localhost
