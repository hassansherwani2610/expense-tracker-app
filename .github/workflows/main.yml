        ports:
          - 9092:9092
        options: >-
          --health-cmd="kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=10

    defaults:
      run:
        working-directory: backend/userservice/userservice

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
